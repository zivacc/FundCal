# FundCal Nginx 配置 — Aliyun ECS + Cloudflare 反代
# 域名: fc.ziva.cc.cd  (Cloudflare 代理 → 47.96.20.252:80)
#
# 部署:
#   sudo cp nginx/fundcal.conf /etc/nginx/conf.d/fundcal.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare SSL 模式建议:
#   Flexible (CF→源 HTTP 80) — 最简单, 无需源装证书
#   Full     (CF→源 HTTPS 443) — 源端装 self-signed 即可, 更安全

# ─── 真实客户端 IP (从 Cloudflare 头部恢复) ───
# CF 公开 IP 段: https://www.cloudflare.com/ips/ (季度更新)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ─── gzip 压缩 (大幅省流量, 流量计费下尤其关键) ───
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/x-javascript
    application/atom+xml
    image/svg+xml;

# ─── HTTP 主站 ───
server {
    listen 80;
    listen [::]:80;
    server_name fc.ziva.cc.cd;

    root /var/www/fundcal;
    index index.html;

    # 仅放行 Cloudflare 回源 (可选; 启用后非 CF 来源的直连 IP 访问会被 deny)
    # 取消下两行注释以启用. 调试期可保持注释.
    # set $cf_only 1;
    # if ($realip_remote_addr = $remote_addr) { return 403; }

    # ─── 静态页面 ───
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # ─── 大型静态 JSON (allfund 索引) ───
    # 长缓存, Cloudflare 边缘命中 → 不回源 → 流量省
    location ^~ /data/allfund/ {
        add_header Cache-Control "public, max-age=86400, s-maxage=86400" always;
        add_header X-Content-Source "static" always;
        try_files $uri =404;
    }

    # ─── API 反代到 Node (PM2: fund-api) ───
    location /api/ {
        # CORS (前端可能从其他域名访问 API)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        # 允许 CF 缓存动态 API 响应 (短缓存)
        add_header Cache-Control "public, max-age=600, s-maxage=1800" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:3457/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ─── 通用静态资源缓存 ───
    location ~* \.(html)$ {
        add_header Cache-Control "public, max-age=300" always;
    }
    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    # ─── 健康检查 (供 Cloudflare / 监控用) ───
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── 安全: 禁访问敏感目录 ───
    location ~ /\. { deny all; }
    location ^~ /scripts/ { deny all; }
    location ^~ /node_modules/ { deny all; }
    location ^~ /data/funds/ { deny all; }    # 旧 crawler JSON, 不对外
    location ~ /\.env$ { deny all; }
    location ~ /fundcal\.db { deny all; }     # SQLite 不直接对外
    location ^~ /logs/ { deny all; }

    # ─── 错误页 ───
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/fundcal;
        internal;
    }

    # 上传上限 (爬虫上传配置可能用到)
    client_max_body_size 10M;
}
