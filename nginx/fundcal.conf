# FundCal Nginx 配置模板
# 复制到 /etc/nginx/conf.d/fundcal.conf 并重载: nginx -t && systemctl reload nginx
#
# 使用前请替换:
#   YOUR_DOMAIN → 你的域名（如 fund.example.com），不用域名则保持 _ 即可

server {
    listen 80;
    server_name _;

    root /var/www/fundcal;
    index index.html;

    # 静态页面
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # API 反向代理到 Node.js 服务（PM2 管理）
    location /api/ {
        proxy_pass http://127.0.0.1:3457/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # 静态资源缓存
    location ~* \.(json|js|css|html|png|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    # 禁止访问隐藏文件和脚本目录
    location ~ /\. {
        deny all;
    }
    location ^~ /scripts/ {
        deny all;
    }
    location ^~ /node_modules/ {
        deny all;
    }
}
